<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIB Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151932;
            --bg-tertiary: #1e2139;
            --accent-primary: #00d4ff;
            --accent-secondary: #7c3aed;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border-color: #2d3250;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 动画背景 */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 头部 */
        header {
            background: rgba(21, 25, 50, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-stats {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            align-items: center;
        }

        .lang-switch {
            display: flex;
            gap: 0.5rem;
            margin-left: 2rem;
        }

        .lang-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .lang-btn:hover {
            color: var(--text-primary);
            border-color: var(--accent-primary);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border-color: transparent;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-primary);
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* 上传区域 */
        .upload-section {
            background: var(--bg-secondary);
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-section:hover {
            border-color: var(--accent-primary);
            background: var(--bg-tertiary);
            transform: translateY(-2px);
        }

        .upload-section.dragover {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.1);
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .upload-text {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .upload-hint {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        /* 标签页 */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
        }

        .tab {
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent-primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
        }

        /* 内容区域 */
        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 卡片 */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px -2px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* 表格 */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: var(--bg-tertiary);
            color: var(--accent-primary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background: var(--bg-tertiary);
        }

        /* 徽章 */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-coff {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .badge-index {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .badge-unknown {
            background: rgba(148, 163, 184, 0.2);
            color: var(--text-secondary);
        }

        /* 按钮 */
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-primary);
        }

        /* 搜索框 */
        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .search-input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        /* 代码块 */
        .code-block {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            margin: 1rem 0;
        }

        .hex-line {
            display: flex;
            gap: 2rem;
            margin-bottom: 0.25rem;
        }

        .hex-offset {
            color: var(--accent-secondary);
            font-weight: bold;
        }

        .hex-data {
            color: var(--accent-primary);
        }

        .hex-ascii {
            color: var(--text-secondary);
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            opacity: 0.3;
            margin-bottom: 1rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }

            .header-stats {
                display: none;
            }

            .tabs {
                overflow-x: auto;
            }

            .tab {
                padding: 0.75rem 1rem;
                font-size: 0.9rem;
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">📚</div>
                <h1>LIB Analyzer</h1>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <span class="stat-value" id="fileCount">0</span>
                    <span data-i18n="stat_files">Files</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="libSize">0 KB</span>
                    <span data-i18n="stat_size">Size</span>
                </div>
                <div class="lang-switch">
                    <button class="lang-btn" onclick="switchLanguage('zh-CN')" id="lang-zh">中文</button>
                    <button class="lang-btn active" onclick="switchLanguage('en-US')" id="lang-en">English</button>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- 上传区域 -->
        <div class="upload-section" id="uploadSection">
            <div class="upload-icon">📦</div>
            <div class="upload-text" data-i18n="upload_title">Drop .lib file here</div>
            <div class="upload-hint" data-i18n="upload_hint">or click to select file</div>
            <input type="file" id="fileInput" accept=".lib">
        </div>

        <!-- 标签页 -->
        <div class="tabs">
            <button class="tab active" data-tab="files" data-i18n="tab_files">📁 Files</button>
            <button class="tab" data-tab="symbols" data-i18n="tab_symbols">🔣 Symbols</button>
            <button class="tab" data-tab="search" data-i18n="tab_search">🔍 Search</button>
            <button class="tab" data-tab="details" data-i18n="tab_details">📊 Details</button>
        </div>

        <!-- 文件列表 -->
        <div class="content-section active" id="files-section">
            <div class="empty-state" id="filesEmpty">
                <div class="empty-icon">📂</div>
                <p data-i18n="empty_files">Please upload a .lib file first</p>
            </div>
            <div id="filesContent" style="display: none;"></div>
        </div>

        <!-- 符号表 -->
        <div class="content-section" id="symbols-section">
            <div class="empty-state" id="symbolsEmpty">
                <div class="empty-icon">🔣</div>
                <p data-i18n="empty_symbols">Please upload a .lib file first</p>
            </div>
            <div id="symbolsContent" style="display: none;"></div>
        </div>

        <!-- 搜索 -->
        <div class="content-section" id="search-section">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" data-i18n="search_placeholder" placeholder="Enter keyword to search...">
                <button class="btn btn-primary" onclick="performSearch()" data-i18n="btn_search">🔍 Search</button>
            </div>
            <div class="empty-state" id="searchEmpty">
                <div class="empty-icon">🔍</div>
                <p data-i18n="empty_search">Enter keyword to search</p>
            </div>
            <div id="searchResults" style="display: none;"></div>
        </div>

        <!-- 详细信息 -->
        <div class="content-section" id="details-section">
            <div class="empty-state" id="detailsEmpty">
                <div class="empty-icon">📊</div>
                <p data-i18n="empty_details">Click a file in the list to view details</p>
            </div>
            <div id="detailsContent" style="display: none;"></div>
        </div>

        <!-- 加载动画 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p data-i18n="loading">Processing...</p>
        </div>
    </div>

    <script>
        // 多语言翻译
        const translations = {
            'zh-CN': {
                'stat_files': '文件', 'stat_size': '大小',
                'upload_title': '拖放 .lib 文件到这里', 'upload_hint': '或点击选择文件',
                'tab_files': '📁 文件列表', 'tab_symbols': '🔣 符号表', 'tab_search': '🔍 搜索', 'tab_details': '📊 详细信息',
                'empty_files': '请先上传一个 .lib 文件', 'empty_symbols': '请先上传一个 .lib 文件',
                'empty_search': '输入关键字开始搜索', 'empty_details': '点击文件列表中的文件查看详细信息',
                'search_placeholder': '输入关键字搜索...', 'btn_search': '🔍 搜索',
                'loading': '处理中...', 'table_index': '索引', 'table_name': '名称',
                'table_size': '大小', 'table_type': '类型', 'table_actions': '操作',
                'btn_view': '👁️ 查看', 'btn_extract': '💾 提取',
                'detail_file_info': '文件信息', 'detail_index': '索引', 'detail_size': '大小',
                'detail_type': '类型', 'detail_offset': '偏移', 'detail_coff': 'COFF 对象文件',
                'detail_machine': '机器类型', 'detail_sections_count': '节数量', 'detail_symbols_count': '符号数量',
                'detail_sections': '节列表', 'detail_section_name': '名称', 'detail_section_vsize': '虚拟大小',
                'detail_section_rsize': '原始大小', 'detail_hex': '十六进制预览',
                'search_no_result': '未找到匹配结果', 'search_matches': '处匹配'
            },
            'en-US': {
                'stat_files': 'Files', 'stat_size': 'Size',
                'upload_title': 'Drop .lib file here', 'upload_hint': 'or click to select file',
                'tab_files': '📁 Files', 'tab_symbols': '🔣 Symbols', 'tab_search': '🔍 Search', 'tab_details': '📊 Details',
                'empty_files': 'Please upload a .lib file first', 'empty_symbols': 'Please upload a .lib file first',
                'empty_search': 'Enter keyword to search', 'empty_details': 'Click a file in the list to view details',
                'search_placeholder': 'Enter keyword to search...', 'btn_search': '🔍 Search',
                'loading': 'Processing...', 'table_index': 'Index', 'table_name': 'Name',
                'table_size': 'Size', 'table_type': 'Type', 'table_actions': 'Actions',
                'btn_view': '👁️ View', 'btn_extract': '💾 Extract',
                'detail_file_info': 'File Information', 'detail_index': 'Index', 'detail_size': 'Size',
                'detail_type': 'Type', 'detail_offset': 'Offset', 'detail_coff': 'COFF Object File',
                'detail_machine': 'Machine Type', 'detail_sections_count': 'Sections', 'detail_symbols_count': 'Symbols',
                'detail_sections': 'Section List', 'detail_section_name': 'Name', 'detail_section_vsize': 'Virtual Size',
                'detail_section_rsize': 'Raw Size', 'detail_hex': 'Hex Preview',
                'search_no_result': 'No results found', 'search_matches': 'matches'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en-US';

        function t(key) {
            return translations[currentLang][key] || key;
        }

        function switchLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);

            // 更新按钮状态
            document.getElementById('lang-zh').classList.toggle('active', lang === 'zh-CN');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en-US');

            // 更新页面文本
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (el.tagName === 'INPUT') {
                    el.placeholder = t(key);
                } else {
                    el.textContent = t(key);
                }
            });

            // 重新加载文件列表（如果已加载）
            if (currentLibrary) {
                loadFiles();
            }
        }

        // 页面加载时初始化语言
        document.addEventListener('DOMContentLoaded', () => {
            switchLanguage(currentLang);
        });

        let currentLibrary = null;

        // 标签页切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));

                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                document.getElementById(tabName + '-section').classList.add('active');

                // 切换到符号表标签时自动加载
                if (tabName === 'symbols' && currentLibrary) {
                    loadSymbols();
                }
            });
        });

        // 文件上传
        const uploadSection = document.getElementById('uploadSection');
        const fileInput = document.getElementById('fileInput');

        uploadSection.addEventListener('click', () => fileInput.click());

        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('dragover');
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('dragover');
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileUpload(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileUpload(e.target.files[0]);
            }
        });

        // 处理文件上传
        async function handleFileUpload(file) {
            if (!file.name.endsWith('.lib')) {
                alert('请选择 .lib 文件');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            showLoading(true);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    alert('错误: ' + data.error);
                    return;
                }

                currentLibrary = data;
                updateStats(data);
                await loadFiles();

            } catch (error) {
                alert('上传失败: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // 更新统计信息
        function updateStats(data) {
            document.getElementById('fileCount').textContent = data.file_count;
            document.getElementById('libSize').textContent = formatSize(data.size);
        }

        // 加载文件列表
        async function loadFiles() {
            try {
                const response = await fetch('/api/files');
                const data = await response.json();

                if (data.error) {
                    alert('错误: ' + data.error);
                    return;
                }

                displayFiles(data.files);

            } catch (error) {
                alert('加载失败: ' + error.message);
            }
        }

        // 加载符号表
        async function loadSymbols() {
            if (!currentLibrary) {
                console.log('No library loaded yet');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch('/api/symbols');
                const data = await response.json();

                if (data.error) {
                    console.error('API Error:', data.error);
                    const empty = document.getElementById('symbolsEmpty');
                    empty.innerHTML = `
                        <div class="empty-icon">🔣</div>
                        <p>Error: ${data.error}</p>
                    `;
                    empty.style.display = 'block';
                    document.getElementById('symbolsContent').style.display = 'none';
                    return;
                }

                console.log('Symbols loaded:', data.symbols);
                console.log('Total files:', data.total_files, 'COFF files:', data.coff_files);
                displaySymbols(data.symbols, data.total_files, data.coff_files);

            } catch (error) {
                console.error('Load failed:', error);
                const empty = document.getElementById('symbolsEmpty');
                empty.innerHTML = `
                    <div class="empty-icon">🔣</div>
                    <p>Load failed: ${error.message}</p>
                `;
                empty.style.display = 'block';
                document.getElementById('symbolsContent').style.display = 'none';
            } finally {
                showLoading(false);
            }
        }

        // 显示符号表
        function displaySymbols(symbolsData, totalFiles, coffFiles) {
            const container = document.getElementById('symbolsContent');
            const empty = document.getElementById('symbolsEmpty');

            console.log('displaySymbols called with:', symbolsData);

            if (!symbolsData || symbolsData.length === 0) {
                console.log('No symbols data');
                container.style.display = 'none';

                let message = '';
                if (coffFiles === 0) {
                    message = `
                        <div class="empty-icon">📂</div>
                        <p>No COFF object files found in this library</p>
                        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;">
                            This library contains ${totalFiles} file(s), but none are COFF object files with symbols.
                        </p>
                    `;
                } else {
                    message = `
                        <div class="empty-icon">🔣</div>
                        <p>No symbols found</p>
                        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;">
                            Found ${coffFiles} COFF file(s), but they contain no symbols.<br>
                            The symbols may have been stripped from this library.
                        </p>
                    `;
                }

                empty.innerHTML = message;
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            container.style.display = 'block';

            let html = '';
            let totalSymbols = 0;

            symbolsData.forEach(fileSymbols => {
                let hasContent = false;

                let cardHtml = `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">File ${fileSymbols.file_index}: ${fileSymbols.file_name}</h3>
                            <span class="badge badge-coff">${fileSymbols.total_symbols || 0} total symbols</span>
                        </div>
                `;

                if (fileSymbols.functions && fileSymbols.functions.length > 0) {
                    hasContent = true;
                    totalSymbols += fileSymbols.functions.length;
                    cardHtml += `
                        <h4 style="margin-top: 1rem;">Functions (${fileSymbols.functions.length})</h4>
                        <div class="code-block" style="max-height: 400px; overflow-y: auto;">
                    `;
                    fileSymbols.functions.forEach(sym => {
                        const section = sym.section > 0 ? `Section ${sym.section}` : 'External';
                        cardHtml += `<div style="margin-bottom: 0.25rem;">${sym.name} <span style="color: var(--text-secondary); font-size: 0.9em;">${section}</span></div>`;
                    });
                    cardHtml += `</div>`;
                }

                if (fileSymbols.imports && fileSymbols.imports.length > 0) {
                    hasContent = true;
                    totalSymbols += fileSymbols.imports.length;
                    cardHtml += `
                        <h4 style="margin-top: 1rem;">Imports (${fileSymbols.imports.length})</h4>
                        <div class="code-block" style="max-height: 300px; overflow-y: auto;">
                    `;
                    fileSymbols.imports.forEach(sym => {
                        cardHtml += `<div style="margin-bottom: 0.25rem;">${sym.name}</div>`;
                    });
                    cardHtml += `</div>`;
                }

                if (fileSymbols.variables && fileSymbols.variables.length > 0) {
                    hasContent = true;
                    totalSymbols += fileSymbols.variables.length;
                    cardHtml += `
                        <h4 style="margin-top: 1rem;">Variables (${fileSymbols.variables.length})</h4>
                        <div class="code-block" style="max-height: 300px; overflow-y: auto;">
                    `;
                    fileSymbols.variables.forEach(sym => {
                        cardHtml += `<div style="margin-bottom: 0.25rem;">${sym.name}</div>`;
                    });
                    cardHtml += `</div>`;
                }

                cardHtml += `</div>`;

                if (hasContent) {
                    html += cardHtml;
                } else if (fileSymbols.total_symbols > 0) {
                    html += `
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">File ${fileSymbols.file_index}: ${fileSymbols.file_name}</h3>
                                <span class="badge badge-coff">${fileSymbols.total_symbols} symbols</span>
                            </div>
                            <p style="color: var(--text-secondary); padding: 1rem;">
                                This file contains ${fileSymbols.total_symbols} symbols, but they don't match the standard function/import/variable patterns.
                            </p>
                        </div>
                    `;
                }
            });

            if (html === '') {
                console.log('No symbols found in any file');
                container.style.display = 'none';
                empty.innerHTML = `
                    <div class="empty-icon">🔣</div>
                    <p>No recognizable symbols found</p>
                    <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;">
                        The library contains COFF files, but no standard C/C++ symbols were detected.
                    </p>
                `;
                empty.style.display = 'block';
            } else {
                console.log(`Displaying ${totalSymbols} symbols`);
                container.innerHTML = html;
            }
        }

        // 显示文件列表
        function displayFiles(files) {
            const container = document.getElementById('filesContent');
            const empty = document.getElementById('filesEmpty');

            if (files.length === 0) {
                container.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            container.style.display = 'block';

            let html = `
                <div class="card">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>${t('table_index')}</th>
                                    <th>${t('table_name')}</th>
                                    <th>${t('table_size')}</th>
                                    <th>${t('table_type')}</th>
                                    <th>${t('table_actions')}</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            files.forEach(file => {
                const badgeClass = file.type === 'coff' ? 'badge-coff' :
                                   file.type === 'index' ? 'badge-index' : 'badge-unknown';

                html += `
                    <tr>
                        <td>${file.index}</td>
                        <td>${file.name}</td>
                        <td>${formatSize(file.size)}</td>
                        <td><span class="badge ${badgeClass}">${file.type}</span></td>
                        <td>
                            <button class="btn btn-secondary" onclick="viewFileDetails(${file.index})">
                                ${t('btn_view')}
                            </button>
                            <button class="btn btn-secondary" onclick="extractFile(${file.index})">
                                ${t('btn_extract')}
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        // 查看文件详情
        async function viewFileDetails(index) {
            showLoading(true);

            try {
                const response = await fetch(`/api/file/${index}`);
                const data = await response.json();

                if (data.error) {
                    alert('错误: ' + data.error);
                    return;
                }

                displayFileDetails(data);

                // 切换到详细信息标签
                document.querySelector('[data-tab="details"]').click();

            } catch (error) {
                alert('加载失败: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // 显示文件详情
        function displayFileDetails(file) {
            const container = document.getElementById('detailsContent');
            const empty = document.getElementById('detailsEmpty');

            empty.style.display = 'none';
            container.style.display = 'block';

            let html = `
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">${t('detail_file_info')} - ${file.name}</h3>
                    </div>
                    <p><strong>${t('detail_index')}:</strong> ${file.index}</p>
                    <p><strong>${t('detail_size')}:</strong> ${formatSize(file.size)}</p>
                    <p><strong>${t('detail_type')}:</strong> <span class="badge badge-${file.type}">${file.type}</span></p>
                    <p><strong>${t('detail_offset')}:</strong> ${file.offset}</p>
                </div>
            `;

            // COFF 信息
            if (file.coff) {
                html += `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">${t('detail_coff')}</h3>
                        </div>
                        <p><strong>${t('detail_machine')}:</strong> ${file.coff.machine}</p>
                        <p><strong>${t('detail_sections_count')}:</strong> ${file.coff.num_sections}</p>
                        <p><strong>${t('detail_symbols_count')}:</strong> ${file.coff.num_symbols}</p>
                `;

                if (file.coff.sections && file.coff.sections.length > 0) {
                    html += `
                        <h4 style="margin-top: 1rem;">${t('detail_sections')}</h4>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>${t('detail_section_name')}</th>
                                        <th>${t('detail_section_vsize')}</th>
                                        <th>${t('detail_section_rsize')}</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;

                    file.coff.sections.forEach(section => {
                        html += `
                            <tr>
                                <td>${section.name}</td>
                                <td>${section.virtual_size}</td>
                                <td>${section.raw_size}</td>
                            </tr>
                        `;
                    });

                    html += `
                                </tbody>
                            </table>
                        </div>
                    `;
                }

                html += `</div>`;
            }

            // 十六进制预览
            if (file.hex_preview && file.hex_preview.length > 0) {
                html += `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">${t('detail_hex')}</h3>
                        </div>
                        <div class="code-block">
                `;

                file.hex_preview.forEach(line => {
                    html += `
                        <div class="hex-line">
                            <span class="hex-offset">${line.offset}:</span>
                            <span class="hex-data">${line.hex}</span>
                            <span class="hex-ascii">${line.ascii}</span>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // 提取文件
        function extractFile(index) {
            window.location.href = `/api/extract/${index}`;
        }

        // 搜索
        async function performSearch() {
            const keyword = document.getElementById('searchInput').value.trim();

            if (!keyword) {
                alert('请输入搜索关键字');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(keyword)}`);
                const data = await response.json();

                if (data.error) {
                    alert('错误: ' + data.error);
                    return;
                }

                displaySearchResults(data.results, keyword);

            } catch (error) {
                alert('搜索失败: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // 显示搜索结果
        function displaySearchResults(results, keyword) {
            const container = document.getElementById('searchResults');
            const empty = document.getElementById('searchEmpty');

            if (results.length === 0) {
                container.style.display = 'none';
                empty.innerHTML = `
                    <div class="empty-icon">🔍</div>
                    <p>${t('search_no_result')} "${keyword}"</p>
                `;
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            container.style.display = 'block';

            let html = '';

            results.forEach(result => {
                html += `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">File ${result.file_index}: ${result.file_name}</h3>
                            <span class="badge badge-coff">${result.matches.length} ${t('search_matches')}</span>
                        </div>
                        <div class="code-block">
                `;

                result.matches.forEach(match => {
                    html += `
                        <div style="margin-bottom: 0.5rem;">
                            <span style="color: var(--accent-secondary);">${match.offset}:</span>
                            <span style="color: var(--text-primary);">${escapeHtml(match.context)}</span>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 搜索框回车
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // 工具函数
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
